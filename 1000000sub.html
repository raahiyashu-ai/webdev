<!DOCTYPE html>
<html>

<head>
    <title>Beautiful Slider</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 40px;
            color: white;
        }

        h2 {
            margin-bottom: 20px;
        }

        .slider {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        img {
            width: 420px;
            height: 250px;
            border-radius: 10px;
        }

        button {
            padding: 8px 16px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            background: #4facfe;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #2d8cf0;
        }
    </style>

</head>

<body>

    <h2>🌟 Website Image Slider</h2>

    <div class="slider">
        <img id="slide">
    </div>

    <br>

    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>

    <script>
        var slides = [
            "download (1).webp",
            "download.webp",
            "OIP.webp",
            "OIP (1).webp",
            "OIP (2).webp",
            "OIP (3).webp"
        ];

        var i = 0;
        var img = document.getElementById("slide");

        function show() {
            img.src = slides[i];
        }

        function next() {
            i = (i + 1) % slides.length;
            show();
        }

        function prev() {
            i = (i - 1 + slides.length) % slides.length;
            show();
        }

        show();
        setInterval(next, 3000);
    </script>

</body>

</html>
